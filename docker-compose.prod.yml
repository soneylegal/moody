services:
  caddy:
    image: caddy:2-alpine
    container_name: moody-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
    networks:
      - default

volumes:
  caddy_data:
  caddy_config:
