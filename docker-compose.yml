services:
  postgres:
    image: postgres:16
    container_name: swingbot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swingbot
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swingbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swingbot-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/swingbot
      API_TITLE: Swing Trade Bot API
      API_VERSION: 0.1.0
      # DEV-ONLY keys — regenerate for production!
      JWT_SECRET_KEY: QCQrrRP1ItHJ1gBfWF4Jaxpdrg4jNHaQ2Vpf_etpoeMKh1dDIlmCJcz6zh28JzIYK5dQlczjm-zznHrLNz7mhw
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 120
      JWT_REFRESH_EXPIRE_MINUTES: 10080
      FIELD_ENCRYPTION_KEY: zjjURVowiYDUGRDMboBi1ub4Jpc9t_TTXU2CzTDzaeg=
      CORS_ORIGINS: "http://localhost:8081,http://localhost:19006,http://localhost:8000"
      MARKET_STREAM_INTERVAL_SECONDS: 2.0
    ports:
      - '8000:8000'
    restart: unless-stopped

volumes:
  postgres_data:
