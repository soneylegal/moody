services:
  postgres:
    image: postgres:16
    container_name: swingbot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swingbot
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swingbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7-alpine
    container_name: swingbot-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: swingbot-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/swingbot
      REDIS_URL: redis://redis:6379/0
      API_TITLE: Swing Trade Bot API
      API_VERSION: 0.1.0
      # DEV-ONLY keys — regenerate for production!
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 120
      JWT_REFRESH_EXPIRE_MINUTES: 10080
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      CORS_ORIGINS: "http://localhost:8000,http://localhost:3000"
      MARKET_STREAM_INTERVAL_SECONDS: 2.0
    ports:
      - '8000:8000'
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    container_name: swingbot-celery-worker
    command: celery -A app.tasks worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/swingbot
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    container_name: swingbot-celery-beat
    command: celery -A app.tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

volumes:
  postgres_data:
