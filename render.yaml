services:
  - type: web
    name: moody-api
    runtime: docker
    repo: https://github.com/soneylegal/moody
    branch: main
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moody-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: moody-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://moody-api.onrender.com
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "120"
      - key: JWT_REFRESH_EXPIRE_MINUTES
        value: "10080"
      - key: MARKET_STREAM_INTERVAL_SECONDS
        value: "2.0"
      - key: OTEL_ENABLED
        value: "false"

databases:
  - name: moody-db
    plan: free
    region: ohio
    databaseName: moody
    user: moody

redis:
  - name: moody-redis
    plan: free
    region: ohio
    maxmemoryPolicy: noeviction
