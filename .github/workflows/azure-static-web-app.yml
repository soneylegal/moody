name: Deploy Web UI to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - mobile/**
      - .github/workflows/azure-static-web-app.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_web:
    if: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        shell: bash
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
        run: |
          set -euo pipefail
          required=(AZURE_STATIC_WEB_APPS_API_TOKEN EXPO_PUBLIC_API_BASE_URL)
          missing=0
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing GitHub Secret::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Expo web
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
        run: |
          set -euo pipefail
          npm ci
          npm run build:web
          cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: mobile/dist
          output_location: ""
          skip_app_build: true
