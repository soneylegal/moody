name: Deploy botbot to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-prod-deploy
  cancel-in-progress: false

env:
  AZURE_ENV_NAME: prod
  AZURE_LOCATION: francecentral
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        id: validate_secrets
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          set -euo pipefail
          required=(AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID POSTGRES_ADMIN_PASSWORD JWT_SECRET_KEY)
          missing=0
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing GitHub Secret::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Required GitHub secrets are missing. Configure them in Repository/Environment Secrets."
            exit 1
          fi

      - name: Azure login with OIDC
        id: azure_login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install AZD CLI
        id: install_azd
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://aka.ms/install-azd.sh | bash
          echo "$HOME/.azd/bin" >> "$GITHUB_PATH"

      - name: Validate Azure context
        id: validate_azure_context
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          az version
          az account show --output table
          azd version
          azd config set auth.useAzCliAuth true

      - name: Ensure required Azure providers are registered
        id: ensure_providers
        shell: bash
        run: |
          set -euo pipefail
          providers=(
            Microsoft.App
            Microsoft.ContainerRegistry
            Microsoft.KeyVault
            Microsoft.ManagedIdentity
            Microsoft.OperationalInsights
            Microsoft.Insights
            Microsoft.DBforPostgreSQL
          )

          for ns in "${providers[@]}"; do
            state="$(az provider show --namespace "$ns" --query registrationState -o tsv || echo Unknown)"
            echo "$ns registrationState=$state"
            if [[ "$state" != "Registered" ]]; then
              echo "Registering provider $ns..."
              az provider register --namespace "$ns" --wait
              new_state="$(az provider show --namespace "$ns" --query registrationState -o tsv || echo Unknown)"
              echo "$ns registrationState(after)=$new_state"
            fi
          done

      - name: Setup Node for web build
        id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web UI assets
        id: build_web_ui
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix mobile ci
          npm --prefix mobile run build:web
          rm -rf backend/app_web
          mkdir -p backend/app_web
          cp -R mobile/dist/. backend/app_web/

      - name: Prepare azd environment
        id: prepare_env
        shell: bash
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          azd version
          azd env new "${AZURE_ENV_NAME}" --no-prompt || true
          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${AZURE_SUBSCRIPTION_ID}"
          azd env set AZURE_RESOURCE_GROUP "rg-${AZURE_ENV_NAME}"
          azd env set POSTGRES_ADMIN_PASSWORD "${POSTGRES_ADMIN_PASSWORD}"
          azd env set JWT_SECRET_KEY "${JWT_SECRET_KEY}"

      - name: Validate infrastructure changes
        id: preview_infra
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          azd provision --preview --no-prompt 2>&1 | tee /tmp/azd-provision.log

      - name: Deploy application
        id: deploy_app
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          azd provision --no-prompt 2>&1 | tee /tmp/azd-provision-apply.log

          eval "$(azd env get-values --environment "${AZURE_ENV_NAME}")"
          RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-rg-${AZURE_ENV_NAME}}"
          ACR_ENDPOINT="${AZURE_CONTAINER_REGISTRY_ENDPOINT:-}"

          if [[ -z "$ACR_ENDPOINT" ]]; then
            ACR_ENDPOINT="$(az acr list -g "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv || true)"
            if [[ -n "$ACR_ENDPOINT" ]]; then
              azd env set AZURE_CONTAINER_REGISTRY_ENDPOINT "$ACR_ENDPOINT"
            fi
          fi

          if [[ -z "$ACR_ENDPOINT" ]]; then
            echo "Could not determine ACR endpoint for resource group $RESOURCE_GROUP"
            az acr list -g "$RESOURCE_GROUP" --output table || true
            exit 1
          fi

          echo "Using ACR endpoint: $ACR_ENDPOINT"
          azd deploy --all --no-prompt 2>&1 | tee /tmp/azd-deploy.log

      - name: Verify health endpoint
        id: health_check
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          eval "$(azd env get-values --environment "${AZURE_ENV_NAME}")"
          RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-rg-${AZURE_ENV_NAME}}"
          APP_NAME="$(az containerapp list -g "${RESOURCE_GROUP}" --query "[0].name" -o tsv)"

          if [[ -z "${APP_NAME}" ]]; then
            echo "No Container App found in resource group ${RESOURCE_GROUP}."
            az resource list -g "${RESOURCE_GROUP}" --output table || true
            exit 1
          fi

          FQDN="$(az containerapp show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "properties.configuration.ingress.fqdn" -o tsv)"

          if [[ -z "${FQDN}" ]]; then
            echo "Container App ${APP_NAME} has no ingress FQDN."
            az containerapp show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --output jsonc || true
            exit 1
          fi

          for i in {1..20}; do
            if curl -fsS --connect-timeout 5 --max-time 10 "https://${FQDN}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app readiness... attempt ${i}"

            if (( i % 5 == 0 )); then
              echo "Container App revision status snapshot:"
              az containerapp revision list -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "[].{name:name,active:properties.active,health:properties.healthState,running:properties.runningState,replicas:properties.replicas}" --output table || true
            fi

            sleep 10
          done

          echo "Health check failed after retries"
          az containerapp logs show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --tail 200 || true
          exit 1

      - name: Pipeline diagnostics summary
        if: always()
        shell: bash
        run: |
          echo "checkout=${{ steps.checkout.outcome }}"
          echo "validate_secrets=${{ steps.validate_secrets.outcome }}"
          echo "azure_login=${{ steps.azure_login.outcome }}"
          echo "install_azd=${{ steps.install_azd.outcome }}"
          echo "validate_azure_context=${{ steps.validate_azure_context.outcome }}"
          echo "ensure_providers=${{ steps.ensure_providers.outcome }}"
          echo "setup_node=${{ steps.setup_node.outcome }}"
          echo "build_web_ui=${{ steps.build_web_ui.outcome }}"
          echo "prepare_env=${{ steps.prepare_env.outcome }}"
          echo "preview_infra=${{ steps.preview_infra.outcome }}"
          echo "deploy_app=${{ steps.deploy_app.outcome }}"
          echo "health_check=${{ steps.health_check.outcome }}"

          if [[ "${{ steps.azure_login.outcome }}" != "success" ]]; then
            echo "::error title=Azure Login Failed::Falha no azure/login. Verifique OIDC (federated credential), tenant, subscription e client id."
          fi

          if [[ "${{ steps.preview_infra.outcome }}" == "failure" || "${{ steps.deploy_app.outcome }}" == "failure" ]]; then
            echo "::error title=AZD Deploy Failed::Falha em azd provision/azd up. Verifique permissões de Contributor na subscription/resource group, quotas da região francecentral e providers registrados."

            if [[ -f /tmp/azd-provision.log ]]; then
              echo "::group::azd provision output (tail)"
              tail -n 200 /tmp/azd-provision.log || true
              echo "::endgroup::"
            fi

            if [[ -f /tmp/azd-provision-apply.log ]]; then
              echo "::group::azd provision output (apply tail)"
              tail -n 200 /tmp/azd-provision-apply.log || true
              echo "::endgroup::"
            fi

            if [[ -f /tmp/azd-deploy.log ]]; then
              echo "::group::azd deploy output (tail)"
              tail -n 200 /tmp/azd-deploy.log || true
              echo "::endgroup::"
            fi

            combined_log="/tmp/azd-combined.log"
            cat /tmp/azd-provision.log /tmp/azd-provision-apply.log /tmp/azd-deploy.log 2>/dev/null > "$combined_log" || true

            if grep -Eqi "SubscriptionIsOverQuota|QuotaExceeded|exceed(ed)? quota|OperationNotAllowed" "$combined_log"; then
              echo "::error title=Quota Limit Detected::A subscription atingiu limite de quota/vCPU. Em Azure for Students isso e comum e exige reduzir SKU, trocar regiao ou pedir aumento de quota."
            fi

            if grep -Eqi "The selected region is currently not accepting new customers|LocationNotAvailableForSubscription|not available in location|locationineligible" "$combined_log"; then
              echo "::error title=Region Access Restriction::A regiao/francecentral pode estar bloqueada para novos recursos nesse tenant/subscription. Isso pode acontecer em ofertas estudantis."
            fi

            if grep -Eqi "SubscriptionDisabled|ReadOnlyDisabledSubscription|spending limit|offer does not support|OfferNotSupported" "$combined_log"; then
              echo "::error title=Subscription Offer Restriction::A assinatura pode estar com spending limit/credito esgotado ou restricao da oferta Azure for Students."
            fi

            if grep -Eqi "AuthorizationFailed|does not have authorization|insufficient privileges" "$combined_log"; then
              echo "::error title=Authorization Failed::Permissoes insuficientes no escopo de deploy (subscription/resource group)."
            fi

            if grep -Eqi "MissingSubscriptionRegistration|is not registered" "$combined_log"; then
              echo "::error title=Provider Not Registered::Provider necessario nao registrado para a subscription."
            fi

            if [[ -d "$HOME/.azd/log" ]]; then
              echo "AZD log directory: $HOME/.azd/log"
              find "$HOME/.azd/log" -type f | while read -r log_file; do
                echo "::group::AZD log tail - ${log_file}"
                tail -n 200 "$log_file" || true
                echo "::endgroup::"
              done
            else
              echo "No AZD log directory found."
            fi
          fi
