name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
          # We also increase pip default timeout/retries to help with any PyPI network issues
        run: |
          pip install --upgrade pip
          pip install --default-timeout=100 --retries 10 -e "backend/[dev]"

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/testdb
          JWT_SECRET_KEY: ci-test-secret-key-minimum-length-for-safety-purposes
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
